    max_pred_locks_per_transaction = 128


    include_dir = ''conf.d'''
  /etc/redis/redis.conf: '# Redis 7 configuration for finops-control-plane

    # Service: redis-cache

    # Environment: production

    # Region: ap-southeast-1


    bind 127.0.0.1

    protected-mode yes

    port 6379

    tcp-backlog 511

    timeout 0

    tcp-keepalive 300


    daemonize no

    supervised systemd

    pidfile /run/redis/redis-server.pid


    loglevel notice

    logfile /var/log/redis/redis-server.log

    syslog-enabled no


    databases 16

    always-show-logo no

    set-proc-title yes

    proc-title-template "{title} {listen-addr} {server-mode}"


    dir /var/lib/redis

    dbfilename dump.rdb


    save 900 1

    save 300 10

    save 60 10000

    stop-writes-on-bgsave-error yes

    rdbcompression yes

    rdbchecksum yes

    rdb-del-sync-files no


    appendonly yes

    appendfilename "appendonly.aof"

    appenddirname "appendonlydir"

    appendfsync everysec

    no-appendfsync-on-rewrite no

    auto-aof-rewrite-percentage 100

    auto-aof-rewrite-min-size 64mb

    aof-load-truncated yes

    aof-use-rdb-preamble yes


    requirepass ${REDIS_PASSWORD}

    masterauth ${REDIS_PASSWORD}


    replica-serve-stale-data yes

    replica-read-only yes


    lazyfree-lazy-eviction yes

    lazyfree-lazy-expire yes

    lazyfree-lazy-server-del yes


    maxmemory 512mb

    maxmemory-policy allkeys-lru


    client-output-buffer-limit normal 0 0 0

    client-output-buffer-limit replica 256mb 64mb 60

    client-output-buffer-limit pubsub 32mb 8mb 60


    hz 10

    dynamic-hz yes


    activerehashing yes


    latency-monitor-threshold 100

    slowlog-log-slower-than 10000

    slowlog-max-len 256


    notify-keyspace-events ""


    hash-max-listpack-entries 512

    hash-max-listpack-value 64

    list-max-listpack-size -2

    set-max-intset-entries 512

    zset-max-listpack-entries 128

    zset-max-listpack-value 64


    stream-node-max-bytes 4096

    stream-node-max-entries 100


    jemalloc-bg-thread yes


    aclfile /etc/redis/users.acl


    rename-command FLUSHALL ""

    rename-command FLUSHDB ""

    rename-command KEYS ""

    rename-command CONFIG "CONFIG_bf1f0f_placeholder"


    unixsocket /run/redis/redis-server.sock

    unixsocketperm 770


    client-query-buffer-limit 1gb

    proto-max-bulk-len 512mb


    repl-diskless-sync yes

    repl-diskless-sync-delay 5


    shutdown-timeout 10


    # Finops operational notes:

    # - Redis is bound to localhost and intended for ops-api on 127.0.0.1:6379.

    # - Persistence uses both RDB snapshots and AOF for recovery of rate-limit and
    job-state data.

    # - Password must be injected by service environment; do not place real secrets
    in this file.

    # - ACL rules should be maintained in /etc/redis/users.acl under change control.'
