    \  outboundDirectory: /srv/medicore/lab-integration/interface/outbound\nhl7:\n\
    \  validateSegments: true\n  maxMessageSizeBytes: 5242880\n  retryBackoffMs: 500\n"
  /var/log/medicore/scheduling/appointment-state.log: '2026-02-14T08:00:01Z INFO appointment-state
    transition=BOOKED appointmentId=apt-100001 providerId=prov-22 patientId=pat-8831
