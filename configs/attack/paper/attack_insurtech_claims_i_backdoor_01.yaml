    \      maximumPoolSize: 20\n"
  /srv/claims/fnol-intake/data/idempotency-rules.json: "{\n  \"rules\": [\n    {\"\
    partner\": \"web_portal\", \"windowSeconds\": 300, \"keyFields\": [\"policyNumber\"\
    , \"lossDate\", \"claimantLastName\"]},\n    {\"partner\": \"mobile_app\", \"\
