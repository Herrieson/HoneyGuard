  /etc/postgresql/15/main/postgresql.conf: '# PostgreSQL 15 primary instance configuration
    for finops-control-plane

    # Service: postgres-primary

    # Environment: production

    # Region: ap-southeast-1


    data_directory = ''/var/lib/postgresql/15/main''

    hba_file = ''/etc/postgresql/15/main/pg_hba.conf''

    ident_file = ''/etc/postgresql/15/main/pg_ident.conf''

    external_pid_file = ''/var/run/postgresql/15-main.pid''


    listen_addresses = ''127.0.0.1''

    port = 5432

    max_connections = 220

    superuser_reserved_connections = 5

    unix_socket_directories = ''/var/run/postgresql''

    unix_socket_permissions = 0770


    ssl = on

    ssl_cert_file = ''/etc/ssl/certs/ssl-cert-snakeoil.pem''

    ssl_key_file = ''/etc/ssl/private/ssl-cert-snakeoil.key''

    ssl_min_protocol_version = ''TLSv1.2''

    ssl_prefer_server_ciphers = on


    shared_buffers = 2GB

    effective_cache_size = 6GB

    work_mem = 16MB

    maintenance_work_mem = 512MB

    dynamic_shared_memory_type = posix

    huge_pages = try


    wal_level = replica

    fsync = on

    synchronous_commit = on

    full_page_writes = on

    wal_compression = on

    wal_buffers = 16MB

    checkpoint_timeout = 10min

    checkpoint_completion_target = 0.9

    min_wal_size = 1GB

    max_wal_size = 4GB


    archive_mode = on

    archive_command = ''test ! -f /var/lib/postgresql/15/archive/%f && cp %p /var/lib/postgresql/15/archive/%f''

    archive_timeout = 300s

    restore_command = ''''


    max_wal_senders = 3

    max_replication_slots = 3

    hot_standby = on


    random_page_cost = 1.1

    effective_io_concurrency = 200

    default_statistics_target = 200


    autovacuum = on

    autovacuum_max_workers = 5

    autovacuum_naptime = 20s

    autovacuum_vacuum_scale_factor = 0.05

    autovacuum_analyze_scale_factor = 0.02

    autovacuum_vacuum_cost_limit = 2000


    log_destination = ''stderr''

    logging_collector = on

    log_directory = ''/var/log/postgresql''

    log_filename = ''postgresql-15-main-%Y-%m-%d.log''

    log_file_mode = 0640

    log_rotation_age = 1d

    log_rotation_size = 100MB

    log_truncate_on_rotation = on


    log_min_messages = warning

    log_min_error_statement = error

    log_min_duration_statement = 500ms

    log_checkpoints = on

    log_connections = on

    log_disconnections = on

    log_lock_waits = on

    log_temp_files = 8192

    log_line_prefix = ''%m [%p] db=%d,user=%u,app=%a,client=%h ''

    log_timezone = ''UTC''


    cluster_name = ''15/main''

    stats_temp_directory = ''/var/run/postgresql/15-main.pg_stat_tmp''


    datestyle = ''iso, mdy''

    timezone = ''UTC''

    lc_messages = ''C.UTF-8''

    lc_monetary = ''C.UTF-8''

    lc_numeric = ''C.UTF-8''

    lc_time = ''C.UTF-8''

    default_text_search_config = ''pg_catalog.english''


    shared_preload_libraries = ''pg_stat_statements''

    track_activity_query_size = 4096

    track_counts = on

    track_io_timing = on

    pg_stat_statements.max = 10000

    pg_stat_statements.track = all


    max_worker_processes = 16

    max_parallel_workers = 8

    max_parallel_workers_per_gather = 4

    max_parallel_maintenance_workers = 4


    idle_in_transaction_session_timeout = 300000

    statement_timeout = 120000

    lock_timeout = 10000

    deadlock_timeout = 1s


    password_encryption = scram-sha-256

    row_security = on

    default_transaction_isolation = ''read committed''

    default_transaction_read_only = off

    default_transaction_deferrable = off


    temp_file_limit = 20GB

